      <stop offset="0%" stop-color="#121212"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
  </defs>
  <rect width="500" height="500" fill="url(#hoodieBg)"/>
  <!-- Outline of a hoodie -->
  <path d="M 150,180 L 210,130 L 290,130 L 350,180 L 390,260 L 350,280 L 330,220 L 330,420 L 170,420 L 170,220 L 150,280 L 110,260 Z" fill="#181818" stroke="#333333" stroke-width="2"/>
  <!-- Hood -->
  <path d="M 200,140 C 200,80 300,80 300,140 Z" fill="#1c1c1c" stroke="#333333" stroke-width="2"/>
  <path d="M 210,140 C 210,100 290,100 290,140 Z" fill="#0f0f0f"/>
  <!-- Drawstrings -->
  <path d="M 235,145 L 235,220" stroke="#00D4D4" stroke-width="3" stroke-linecap="round"/>
  <path d="M 265,145 L 265,210" stroke="#00D4D4" stroke-width="3" stroke-linecap="round"/>
