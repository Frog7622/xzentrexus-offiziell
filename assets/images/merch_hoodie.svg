  <path d="M 240,230 L 260,230 M 250,220 L 250,240" stroke="#00D4D4" stroke-width="2"/>
  <text x="50%" y="470" text-anchor="middle" fill="#ffffff" font-family="'Outfit', sans-serif" font-size="16" letter-spacing="4">XZENTREXUS HOODIE</text>
  <text x="50%" y="490" text-anchor="middle" fill="#00D4D4" font-family="'Outfit', sans-serif" font-size="12" letter-spacing="2">LIMITED EDITION</text>
</svg>
